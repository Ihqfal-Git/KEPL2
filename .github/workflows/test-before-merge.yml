name: Test Before Merge

on:
  pull_request:
    branches: [ main ]

jobs:
  test-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g htmlhint
          npm install -g stylelint stylelint-config-standard

      - name: Run HTMLHint
        run: htmlhint "**/*.html"

      - name: Run Stylelint
        run: stylelint "**/*.css"
